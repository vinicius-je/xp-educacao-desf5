services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pitlaneshop-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'PitLaneShop@Dev2024'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  backend:
    image: ghcr.io/vinicius-je/xp-educacao-desf5@sha256:fb8055c4f035f94f5dd3355bc4015b4470788a91b178ee6143ebb1434bd24821
    container_name: pitlaneshop-backend
    depends_on:
      - sqlserver
    ports:
      - '3000:8080'
      - '3001:8081'
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PitLaneShop;User Id=sa;Password=PitLaneShop@Dev2024;TrustServerCertificate=True;MultipleActiveResultSets=true"
    restart: unless-stopped

  frontend:
    image: ghcr.io/vinicius-je/xp-educacao-desf5-frontend@sha256:9f1f7c4517b5cdb93c6634ce617b48d627346891d5103551e9145fdf64f634d4
    container_name: pitlaneshop-frontend
    ports:
      - '4000:4000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
