services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pitlaneshop-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'PitLaneShop@Dev2024'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  backend:
    image: ghcr.io/vinicius-je/xp-educacao-desf5@sha256:48aed307524abb363040ebac5f74be0dd2c35812c27888b9f81c1ac18913f3cf
    container_name: pitlaneshop-backend
    depends_on:
      - sqlserver
    ports:
      - '3001:8080'
      - '3000:8081'
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PitLaneShop;User Id=sa;Password=PitLaneShop@Dev2024;TrustServerCertificate=True;MultipleActiveResultSets=true"
    restart: unless-stopped

  frontend:
    image: ghcr.io/vinicius-je/xp-educacao-desf5-frontend@sha256:a86938605f0b906f67a182a6626f07fa3d9a2735219fdc5947f6e0ca4235a130
    container_name: pitlaneshop-frontend
    ports:
      - '4000:4000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
